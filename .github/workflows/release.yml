name: Release
on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write
jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch main branch
        run: git fetch origin main --force
      - name: Ensure tagged commit belongs to main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Error: the tagged commit is not contained in origin/main"
            exit 1
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Lint (non-blocking for release)
        continue-on-error: true
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build app
        run: npm run build
      - name: Create release archive
        run: |
          cd dist
          zip -r "../exin-${GITHUB_REF_NAME}-dist.zip" .
      - name: Generate checksum
        run: sha256sum "exin-${GITHUB_REF_NAME}-dist.zip" > "exin-${GITHUB_REF_NAME}-dist.zip.sha256"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            exin-${GITHUB_REF_NAME}-dist.zip
            exin-${GITHUB_REF_NAME}-dist.zip.sha256
