name: CI jobs

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  docker:
    name: docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t exin:ci .
      - name: Run container
        run: docker run -d --name exin -p 8080:80 exin:ci
      - name: Healthcheck
        run: |
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              echo "container is serving"; exit 0
            fi
            sleep 2
          done
          echo "container did not become healthy"; docker logs exin; exit 1
      - name: Stop container
        if: always()
        run: docker rm -f exin || true
