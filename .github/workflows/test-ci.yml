name: Test Branch CI
on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - test
jobs:
  validate:
    name: Lint, test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build application
        run: npm run build
