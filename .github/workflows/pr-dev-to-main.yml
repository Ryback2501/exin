name: PR dev to main

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-dev-to-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-source:
    name: Source must be dev
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        env:
          HEAD: ${{ github.head_ref }}
        run: |
          if [ "$HEAD" != "dev" ]; then
            echo "error: only 'dev' can target main, got '$HEAD'"
            exit 1
          fi

  check-divergence:
    name: dev contains all of main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: rev-list count origin/dev..origin/main must be 0
        run: |
          git fetch origin dev main
          BEHIND=$(git rev-list --count origin/dev..origin/main)
          if [ "$BEHIND" -ne 0 ]; then
            echo "error: dev is missing $BEHIND commit(s) from main."
            echo "Merge main into dev via a chore/* PR before opening this PR."
            exit 1
          fi
          echo "dev contains all of main."

  version-gate:
    name: Version gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "error: could not parse a semver version from package.json"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
      - name: Tag v$VERSION must not exist
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git fetch --tags
          if git tag --list "v$VERSION" | grep -q .; then
            echo "error: tag v$VERSION already exists — bump the version on a work branch first."
            exit 1
          fi
      - name: Version must be strictly greater than latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')
          LATEST="${LATEST#v}"
          if [ -z "$LATEST" ]; then
            echo "No previous release — accepting $VERSION as first release."
            exit 0
          fi
          HIGHER=$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -n1)
          if [ "$VERSION" = "$LATEST" ] || [ "$HIGHER" = "$LATEST" ]; then
            echo "error: VERSION ($VERSION) must be strictly greater than latest release ($LATEST)"
            exit 1
          fi
          echo "Version check passed: $VERSION > $LATEST"

  ci:
    name: CI
    needs: [check-source, check-divergence, version-gate]
    uses: ./.github/workflows/ci-jobs.yml

  auto-merge:
    name: Fast-forward main to dev
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Advance main ref to dev SHA (requires GH_PAT)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          DEV_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/dev --jq '.object.sha')
          gh api repos/${{ github.repository }}/git/refs/heads/main \
            --method PATCH \
            -f sha="$DEV_SHA" \
            -F force=false
