<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exin</title>
    <!--
      GitHub Pages SPA redirect (https://github.com/rafgraph/spa-github-pages).
      Pages has no server-side rewrite, so a hard refresh on a sub-route lands
      here. This encodes the requested path into a query string and bounces to
      the app's index.html, where the matching snippet restores the URL.
      pathSegmentsToKeep = 1 keeps the /exin/ project base in the path.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
